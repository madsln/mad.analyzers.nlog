name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'versions/*'
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore mad.analyzers.sln

      - name: Build solution
        run: dotnet build mad.analyzers.sln --no-restore --configuration Release

      - name: Run unit tests
        run: dotnet test mad.analyzers.sln --no-build --configuration Release --verbosity normal

  publish:
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/versions/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore mad.analyzers.sln

      - name: Build solution
        run: dotnet build mad.analyzers.sln --no-restore --configuration Release

      - name: Build package (pack)
        run: dotnet pack src/package/mad.analyzers.nlog.Package/mad.analyzers.nlog.Package.csproj --configuration Release --no-build --output ./nupkgs

      - name: Push package to NuGet
        run: dotnet nuget push ./nupkgs/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGETORGAPIKEY }}